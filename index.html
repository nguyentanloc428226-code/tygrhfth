<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sơ đồ FAS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eee; margin: 0; padding: 10px; user-select: none; }
        .con { background: #fff; border: 2px solid #333; padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pin { 
            height: 60px; border: 1px solid #444; display: flex; align-items: center; 
            justify-content: center; text-align: center; font-weight: bold; font-size: 13px;
            border-radius: 4px; cursor: pointer;
        }
        /* Màu dây */
        .r { background: #ff3b30; color: #fff; }
        .b { background: #007aff; color: #fff; }
        .empty { background: #ccc; color: #666; }

        /* Hiệu ứng nháy mạnh */
        .active {
            animation: blink 0.5s infinite;
            background: #fff !important;
            color: #ff0000 !important;
            border: 3px solid #ff0000 !important;
            box-shadow: 0 0 15px #ff0000;
        }
        @keyframes blink { 50% { opacity: 0.3; } }
        #ft { position: fixed; bottom: 0; left: 0; width: 100%; background: #222; color: #fff; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <h3>SƠ ĐỒ TRỰC QUAN FAS</h3>
    <div class="con">
        <div>CONNECTOR 1</div>
        <div class="grid">
            <div class="pin r" ontouchstart="go(this)" onclick="go(this)">274 0.13 R/</div>
            <div class="pin b" ontouchstart="go(this)" onclick="go(this)">150 0.13 B/</div>
            <div class="pin empty">TRỐNG</div>
        </div>
    </div>
    <div class="con">
        <div>CONNECTOR 2</div>
        <div class="grid">
            <div class="pin empty">TRỐNG</div>
            <div class="pin r" ontouchstart="go(this)" onclick="go(this)">274 0.13 R/</div>
            <div class="pin b" ontouchstart="go(this)" onclick="go(this)">150 0.13 B/</div>
        </div>
    </div>
    <div id="ft">Chạm vào ô dây để tra cứu</div>
    <script>
        function go(el) {
            const val = el.innerText.trim();
            const pins = document.querySelectorAll('.pin');
            if(val === "TRỐNG") return;
            pins.forEach(p => p.classList.remove('active'));
            pins.forEach(p => { if(p.innerText.trim() === val) p.classList.add('active'); });
            document.getElementById('ft').innerHTML = "Đang chọn: " + val;
        }
    </script>
</body>
</html>
